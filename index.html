<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QRツイン リーダー</title>
    <meta name="apple-mobile-web-app-title" content="QRツイン">
    <meta name="application-name" content="QRツイン">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">

    <!-- ★この index.html は「管理部+XOR対応の jsQR.js（パッチ済み）」が必要です -->
    <script src="./jsQR.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; background-color: #121212; color: #ffffff; text-align: center;
        }
        h2 { margin: 15px 0; font-size: 1.2rem; }
        #startScreen { padding: 20px; margin-top: 50px; }
        .camera-container { position: relative; width: 100%; max-width: 520px; margin: 0 auto; }
        video { width: 100%; border-radius: 12px; border: 2px solid #2a3348; }
        canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; pointer-events: none; }
        button {
            padding: 14px 18px; font-size: 16px; border-radius: 10px;
            border: 1px solid #2a3348; background: #0c0f18; color: #e8eef7;
            width: 90%; max-width: 320px;
        }
        button:disabled { opacity: .6; }

        .panel {
            max-width: 560px; margin: 14px auto; padding: 12px;
            border: 1px solid #2a3348; border-radius: 12px; background: #171a26;
            text-align: left;
        }
        .row { display: grid; grid-template-columns: 120px 1fr; gap: 8px; padding: 6px 0; }
        .label { color: #9fb0c7; }
        .value { word-break: break-all; }
        .sub { font-size: 12px; color: #9fb0c7; margin: 8px auto 0; max-width: 560px; padding: 0 12px; }

        #resultScreen { display: none; }
        #passwordScreen {
            display: none;
            position: fixed; left:0; top:0; right:0; bottom:0;
            background: rgba(0,0,0,.85);
            align-items: center; justify-content: center;
            z-index: 1000;
        }
        #passwordBox {
            width: min(92vw, 420px);
            background: #171a26;
            border: 1px solid #2a3348;
            border-radius: 14px;
            padding: 14px;
            text-align: left;
        }
        #passwordBox input {
            width: 100%;
            font-size: 16px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #2a3348;
            background: #0c0f18;
            color: #e8eef7;
            box-sizing: border-box;
            margin: 8px 0 12px;
        }
        #passwordBox .btnrow { display:flex; gap:10px; }
        #passwordBox .btnrow button { width: 100%; }
        #detectorInfo {
            margin: 8px auto 0;
            max-width: 560px;
            padding: 0 12px;
            color: #9fb0c7;
            font-size: 12px;
            text-align: left;
        }
    </style>
</head>

<body>
    <h2>QRツイン リーダー</h2>

    <div id="startScreen">
        <button id="startBtn">📷 カメラ起動</button>
        <div id="detectorInfo"></div>
        <div class="sub">
            ※この版は「1個目に固定される問題」を減らすため、<br>
            1個目を読めた後も第2QR探索を並列で走らせます（ファインダのみマスク + クロップ探索）。
        </div>
    </div>

    <div id="scanScreen" style="display:none;">
        <div class="camera-container">
            <video id="video" playsinline></video>
            <canvas id="overlayCanvas"></canvas>
        </div>

        <div class="panel">
            <div class="row"><div class="label">第1QR</div><div class="value" id="text1">---</div></div>
            <div class="row"><div class="label">管理部</div><div class="value" id="mg1">---</div></div>
            <hr style="border:0;border-top:1px solid #2a3348;margin:10px 0;">
            <div class="row"><div class="label">第2QR</div><div class="value" id="text2">---</div></div>
            <div class="row"><div class="label">管理部</div><div class="value" id="mg2">---</div></div>
        </div>

        <div class="sub">
            緑枠＝第1QR / 青枠＝第2QR
        </div>
    </div>

    <div id="resultScreen">
        <div class="panel">
            <div class="row"><div class="label">第1QR</div><div class="value" id="result1">---</div></div>
            <div class="row"><div class="label">第2QR</div><div class="value" id="result2">---</div></div>
        </div>
        <button id="restartBtn">↩ もう一度</button>
    </div>

    <div id="passwordScreen">
        <div id="passwordBox">
            <div style="font-size:14px;color:#e8eef7;">🔐 パスワード入力（暗号化QRの復号用）</div>
            <input id="passwordInput" type="password" placeholder="パスワード" autocomplete="current-password">
            <div class="btnrow">
                <button id="pwOkBtn">OK</button>
                <button id="pwCancelBtn">キャンセル</button>
            </div>
            <div class="sub" style="padding:0;margin:10px 0 0;">
                ※第1QRの管理部フラグにより、パスワードが必要な場合のみ表示されます。
            </div>
        </div>
    </div>

<script>
(function () {
    const video = document.getElementById('video');
    const overlayCanvas = document.getElementById('overlayCanvas');
    const ctx = overlayCanvas.getContext('2d');
    const zxingCanvas = document.createElement('canvas');
    const zxingCtx = zxingCanvas.getContext('2d', { willReadFrequently: true });

    let isProcessing = false;
    let isScanning = false;
    let lastDetectTime = 0;
    const SCAN_INTERVAL_MS = 200;

    let firstQR = null;
    let secondQR = null;

    let appPassword = null;
    let appMask = null;

    // クロップ探索の周回インデックス（1フレームで1箇所だけ回して負荷を抑える）
    let cropScanIndex = 0;

    // ---------- UI ----------
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    startBtn.addEventListener('click', startApp);
    restartBtn.addEventListener('click', () => location.reload());

    document.getElementById('pwOkBtn').addEventListener('click', () => {
        const pw = document.getElementById('passwordInput').value || "";
        appPassword = pw;
        // ここは実装済みの派生処理に合わせてください（例：pw→mask生成）
        // 既存仕様：appMask が外部で作られる前提の場合はここを変更不要
        // もし「pwからmaskを作る」なら、あなたの既存ロジックをここへ移植してください。
        hidePasswordScreen();
    });

    document.getElementById('pwCancelBtn').addEventListener('click', () => {
        hidePasswordScreen();
    });

    function showPasswordScreen() {
        document.getElementById('passwordInput').value = "";
        document.getElementById('passwordScreen').style.display = "flex";
    }
    function hidePasswordScreen() {
        document.getElementById('passwordScreen').style.display = "none";
    }

    function showScanScreen() {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'none';
        document.getElementById('scanScreen').style.display = 'block';
    }

    function showResultScreen() {
        document.getElementById('scanScreen').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'block';

        document.getElementById('result1').innerHTML = formatResultText(firstQR ? firstQR.text : "---");
        document.getElementById('result2').innerHTML = formatResultText(secondQR ? secondQR.text : "---");
    }

    // ---------- Camera ----------
    async function startApp() {
        startBtn.disabled = true;
        startBtn.innerText = "準備中...";

        if (typeof jsQR === 'undefined') {
            alert("jsQR.jsの読み込みに失敗しました。");
            return;
        }
        document.getElementById('detectorInfo').innerText = "⚡ エンジン: カスタム jsQR (管理部+XOR対応)";

        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" },
                audio: false
            });
            video.srcObject = stream;
            await video.play();

            showScanScreen();
            isScanning = true;
            requestAnimationFrame(scanLoop);

            startBtn.innerText = "起動中";
        } catch (e) {
            alert("カメラ起動に失敗しました: " + e);
            startBtn.disabled = false;
            startBtn.innerText = "📷 カメラ起動";
        }
    }

    // ---------- Helpers ----------
    function getCenter(pts) {
        let x = 0, y = 0;
        for (const p of pts) { x += p.x; y += p.y; }
        return { x: x / pts.length, y: y / pts.length };
    }

    function getDistance(p1, p2) {
        return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
    }

    function drawBoundingBox(points, color) {
        if (!points || points.length < 4) return;
        ctx.strokeStyle = color;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
        ctx.closePath();
        ctx.stroke();
    }

    function codeToItem(code, offsetX = 0, offsetY = 0) {
        const pts = [
            { x: code.location.topLeftCorner.x + offsetX, y: code.location.topLeftCorner.y + offsetY },
            { x: code.location.topRightCorner.x + offsetX, y: code.location.topRightCorner.y + offsetY },
            { x: code.location.bottomRightCorner.x + offsetX, y: code.location.bottomRightCorner.y + offsetY },
            { x: code.location.bottomLeftCorner.x + offsetX, y: code.location.bottomLeftCorner.y + offsetY }
        ];
        return {
            text: code.data,
            managementCode: code.managementCode,
            points: pts,
            center: getCenter(pts)
        };
    }

    function cloneImageData(imageData) {
        return new ImageData(new Uint8ClampedArray(imageData.data), imageData.width, imageData.height);
    }

    // ファインダーパターン（左上・右上・左下）だけを白塗りして、同じQRを再検出しにくくする
    // ※QRツインは重なっているので、領域全体ではなく「ファインダだけ」マスクする
    function maskFinderPatterns(imageData, qrPoints) {
        if (!qrPoints || qrPoints.length < 4) return imageData;

        // 推定QR幅（上辺長）
        const qrEdge = Math.max(10, getDistance(qrPoints[0], qrPoints[1]));
        // 経験則：QR幅の約22%をマスク（上限35%）
        const box = Math.max(12, Math.min(qrEdge * 0.22, qrEdge * 0.35));

        const corners = [
            qrPoints[0], // topLeft
            qrPoints[1], // topRight
            qrPoints[3]  // bottomLeft
        ];

        const w = imageData.width;
        const h = imageData.height;
        const data = imageData.data;

        for (const c of corners) {
            const cx = Math.round(c.x);
            const cy = Math.round(c.y);

            const x0 = Math.max(0, cx - Math.round(box / 2));
            const y0 = Math.max(0, cy - Math.round(box / 2));
            const x1 = Math.min(w - 1, cx + Math.round(box / 2));
            const y1 = Math.min(h - 1, cy + Math.round(box / 2));

            for (let y = y0; y <= y1; y++) {
                let idx = (y * w + x0) * 4;
                for (let x = x0; x <= x1; x++) {
                    data[idx] = 255;
                    data[idx + 1] = 255;
                    data[idx + 2] = 255;
                    idx += 4;
                }
            }
        }
        return imageData;
    }

    function tryJsQR(imageData, opts, offsetX = 0, offsetY = 0) {
        const code = opts
            ? jsQR(imageData.data, imageData.width, imageData.height, opts)
            : jsQR(imageData.data, imageData.width, imageData.height);
        if (!code) return null;
        return codeToItem(code, offsetX, offsetY);
    }

    function getCrops(w, h) {
        const w2 = Math.floor(w / 2);
        const h2 = Math.floor(h / 2);
        return [
            { x: 0,  y: 0,  w: w2,     h: h2     }, // 左上
            { x: w2, y: 0,  w: w - w2, h: h2     }, // 右上
            { x: 0,  y: h2, w: w2,     h: h - h2 }, // 左下
            { x: w2, y: h2, w: w - w2, h: h - h2 }, // 右下
            { x: Math.floor(w * 0.25), y: Math.floor(h * 0.25), w: Math.floor(w * 0.5), h: Math.floor(h * 0.5) } // 中央
        ];
    }

    // ---------- Core Scan ----------
    async function scanLoop() {
        if (!isScanning) return;

        if (video.videoWidth && overlayCanvas.width !== video.videoWidth) {
            overlayCanvas.width = video.videoWidth;
            overlayCanvas.height = video.videoHeight;
        }
        ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

        if (firstQR) drawBoundingBox(firstQR.points, '#00E676');
        if (secondQR) drawBoundingBox(secondQR.points, '#29B6F6');

        const now = Date.now();
        if (!isProcessing && now - lastDetectTime > SCAN_INTERVAL_MS && video.readyState >= 2) {
            isProcessing = true;
            lastDetectTime = now;

            let detectedItems = [];

            try {
                // 1) フレーム取得
                zxingCanvas.width = overlayCanvas.width;
                zxingCanvas.height = overlayCanvas.height;
                zxingCtx.drawImage(video, 0, 0, zxingCanvas.width, zxingCanvas.height);

                const full = zxingCtx.getImageData(0, 0, zxingCanvas.width, zxingCanvas.height);

                // ---- A: 第1候補（通常） ----
                const itemA = tryJsQR(full, null, 0, 0);
                if (itemA) detectedItems.push(itemA);

                // 1QR目の確定前でも「今読めたもの」を一旦 first として UI/分岐に使えるようにする
                const currentFirst = firstQR || itemA;

                // パスワード要求ロジック（従来互換）
                if (itemA) {
                    const mgmt = itemA.managementCode !== undefined
                        ? itemA.managementCode.toString(2).padStart(16, '0')
                        : "0000000000000000";
                    if (mgmt[7] === '1') { // 暗号化フラグON
                        if (!appPassword && document.getElementById('passwordScreen').style.display !== 'flex') {
                            // 画面に「第1のQR」として表示させるためにまずは登録
                            processDetections([itemA]);
                            showPasswordScreen();
                            isProcessing = false;
                            return;
                        }
                    }
                }

                // ---- B: 第2候補（並列探索） ----
                // 「通常で第1が取れていても」第2探索を必ず走らせる（= 爆速工程寄り）
                if (!secondQR) {
                    // (1) フルフレーム：first のファインダだけマスクして探索
                    const maskedFull = cloneImageData(full);
                    if (currentFirst && currentFirst.points) maskFinderPatterns(maskedFull, currentFirst.points);

                    // 第2は「通常」も「マスクあり(appEncMask)」も両方試す（ただし重複は弾く）
                    const itemB1 = tryJsQR(maskedFull, null, 0, 0);
                    if (itemB1 && (!currentFirst || itemB1.text !== currentFirst.text)) detectedItems.push(itemB1);

                    if (appMask) {
                        const itemB2 = tryJsQR(maskedFull, { appEncMask: Array.from(appMask) }, 0, 0);
                        if (itemB2 && (!currentFirst || itemB2.text !== currentFirst.text)) {
                            if (!detectedItems.some(it => it.text === itemB2.text)) detectedItems.push(itemB2);
                        }
                    }

                    // (2) それでも第2が取れない場合：クロップ探索を段階的に回す（1フレーム1箇所だけ）
                    if (detectedItems.length < 2) {
                        const crops = getCrops(zxingCanvas.width, zxingCanvas.height);
                        const r = crops[cropScanIndex % crops.length];
                        cropScanIndex++;

                        const crop = zxingCtx.getImageData(r.x, r.y, r.w, r.h);
                        const maskedCrop = cloneImageData(crop);

                        // crop座標系に合わせてファインダだけマスク（点を平行移動）
                        if (currentFirst && currentFirst.points) {
                            const pts = currentFirst.points.map(p => ({ x: p.x - r.x, y: p.y - r.y }));
                            // 3点のうち少なくとも1点がcrop内近傍ならマスクを適用
                            const inOrNear = pts.some(p => p.x > -20 && p.y > -20 && p.x < r.w + 20 && p.y < r.h + 20);
                            if (inOrNear) maskFinderPatterns(maskedCrop, pts);
                        }

                        const c1 = tryJsQR(maskedCrop, null, r.x, r.y);
                        if (c1 && (!currentFirst || c1.text !== currentFirst.text)) detectedItems.push(c1);

                        if (appMask && detectedItems.length < 2) {
                            const c2 = tryJsQR(maskedCrop, { appEncMask: Array.from(appMask) }, r.x, r.y);
                            if (c2 && (!currentFirst || c2.text !== currentFirst.text)) {
                                if (!detectedItems.some(it => it.text === c2.text)) detectedItems.push(c2);
                            }
                        }
                    }
                }
            } catch (err) {}

            // 同一フレームで2つ取れたら items.length>=2 が活きる
            processDetections(detectedItems);
            isProcessing = false;
        }

        if (firstQR && secondQR) {
            showResultScreen();
            isScanning = false;
            return;
        }
        requestAnimationFrame(scanLoop);
    }

    function processDetections(items) {
        if (items.length === 0) return;

        if (items.length >= 2) {
            if (!firstQR) { firstQR = items[0]; secondQR = items[1]; updateUI(); return; }
            if (firstQR && !secondQR) {
                const dist0 = getDistance(firstQR.center, items[0].center);
                const dist1 = getDistance(firstQR.center, items[1].center);
                if (dist0 > dist1) { secondQR = items[0]; firstQR = items[1]; }
                else { secondQR = items[1]; firstQR = items[0]; }
                updateUI(); return;
            }
        }

        if (items.length === 1) {
            const item = items[0];
            if (!firstQR) { firstQR = item; updateUI(); }
            else if (!secondQR) {
                if (item.text !== firstQR.text) { secondQR = item; updateUI(); }
                else {
                    const dist = getDistance(firstQR.center, item.center);
                    const qrSize = getDistance(item.points[0], item.points[1]);
                    if (dist > Math.min(overlayCanvas.width * 0.1, qrSize * 0.45)) { secondQR = item; updateUI(); }
                    else { firstQR.points = item.points; firstQR.center = item.center; }
                }
            }
        }
    }

    function updateUI() {
        if (firstQR) {
            document.getElementById('text1').innerText = firstQR.text;
            document.getElementById('mg1').innerText = firstQR.managementCode !== undefined
                ? firstQR.managementCode.toString(2).padStart(16, '0')
                : "なし";
        }
        if (secondQR) {
            document.getElementById('text2').innerText = secondQR.text;
            document.getElementById('mg2').innerText = secondQR.managementCode !== undefined
                ? secondQR.managementCode.toString(2).padStart(16, '0')
                : "なし";
        }
    }

    function formatResultText(text) {
        if (/^https?:\/\//i.test(text)) {
            return `<a href="${text}" target="_blank" style="color: #03DAC6; text-decoration: underline;">${text}</a>`;
        }
        const div = document.createElement('div');
        div.innerText = text;
        return div.innerHTML;
    }
})();
</script>

</body>
</html>
