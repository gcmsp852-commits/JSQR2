<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QRツイン リーダー</title>

  <meta name="apple-mobile-web-app-title" content="QRツイン">
  <meta name="application-name" content="QRツイン">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#121212">

  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon.png">
  <link rel="manifest" href="manifest.json">

  <script src="./jsQR.js"></script>

  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: #121212; color: #ffffff; text-align: center; }
    h2 { margin: 15px 0; font-size: 1.2rem; }
    #startScreen, #resultScreen { padding: 20px; margin-top: 50px; }
    #resultScreen { display: none; }
    .camera-container { position: relative; width: 100%; max-width: 600px; margin: 0 auto; background: #000; display: none; }
    video { width: 100%; display: block; object-fit: cover; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .status-panel { padding: 15px; background: #1e1e1e; border-top: 1px solid #333; text-align: left; max-width: 600px; margin: 0 auto; display: none; }
    .qr-result { margin-bottom: 10px; padding: 10px; border-radius: 8px; background: #2c2c2c; word-break: break-all; }
    .qr-1 { border-left: 5px solid #00E676; }
    .qr-2 { border-left: 5px solid #29B6F6; }
    button { width: 100%; max-width: 300px; padding: 15px; font-size: 1.1rem; font-weight: bold; background: #6200EE; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    button:disabled { background: #555; cursor: not-allowed; color: #aaa; }
    #startBtn { background: #81C784; color: #121212; }
    #startBtn:active { background: #66BB6A; }
    #backBtn { background: #03DAC6; color: #000; margin-top: 30px; }
    #backBtn:active { background: #018786; }
  </style>
</head>
<body>

  <div id="passwordScreen" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: #1e1e1e; padding: 20px; border-radius: 8px; width: 80%; max-width: 400px; text-align: center; border: 1px solid #333;">
      <h3 style="color: #03DAC6; margin-top: 0;">🔒 パスワード入力</h3>
      <p style="font-size: 0.9rem; color: #aaa; margin-bottom: 20px;">
        第2のQRコードはアプリ暗号化されています。<br>復号するためのパスワードを入力してください。
      </p>
      <input type="password" id="appPasswordInput" placeholder="パスワード"
             style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #555; background: #2c2c2c; color: #fff; box-sizing: border-box; font-size: 1rem;">
      <button onclick="submitPassword()"
              style="background: #00E676; color: #000; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; border: none;">
        設定してスキャン再開
      </button>
    </div>
  </div>

  <h2>📱 QRツイン リーダー</h2>

  <div id="startScreen">
    <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 20px;">2つのQRコードを同時に、または連続して読み取ります。</p>
    <button id="startBtn" onclick="startApp()">📷 カメラを起動する</button>
  </div>

  <div class="camera-container" id="cameraContainer">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="overlayCanvas"></canvas>
  </div>

  <div class="status-panel" id="statusPanel">
    <div id="detectorInfo" style="font-size: 0.8rem; color: #aaa; margin-bottom: 10px;">読取エンジン準備中...</div>
    <div class="qr-result qr-1">
      <strong>1個目:</strong> <span id="text1">未検出</span><br>
      <span style="font-size: 0.85em; color: #ccc;">管理部16bit: <span id="mg1">--</span></span>
    </div>
    <div class="qr-result qr-2">
      <strong>2個目:</strong> <span id="text2">未検出</span><br>
      <span style="font-size: 0.85em; color: #ccc;">管理部16bit: <span id="mg2">--</span></span>
    </div>
  </div>

  <div id="resultScreen">
    <h3 style="color: #00E676; margin-bottom: 20px;">✅ 読み取り完了！</h3>
    <div class="qr-result qr-1" style="text-align: left;">
      <strong>1個目:</strong><br> <span id="finalText1"></span><br>
      <span style="font-size: 0.9em; color: #ffeb3b;">管理部16bit: <span id="finalMg1">--</span></span>
    </div>
    <div class="qr-result qr-2" style="text-align: left;">
      <strong>2個目:</strong><br> <span id="finalText2"></span><br>
      <span style="font-size: 0.9em; color: #ffeb3b;">管理部16bit: <span id="finalMg2">--</span></span>
    </div>
    <button id="backBtn" onclick="goBack()">🔙 もとのカメラ画面に戻る</button>
  </div>

<script>
  // =========================
  // SHA-256 / Mask (既存)
  // =========================
  function sha256Bytes(msgBytes){
    const K = new Uint32Array([
      0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
      0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
      0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
      0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
      0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
      0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
      0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
      0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
    ]);
    function rotr(x,n){ return (x>>>n) | (x<<(32-n)); }
    function ch(x,y,z){ return (x & y) ^ (~x & z); }
    function maj(x,y,z){ return (x & y) ^ (x & z) ^ (y & z); }
    function s0(x){ return rotr(x,7) ^ rotr(x,18) ^ (x>>>3); }
    function s1(x){ return rotr(x,17) ^ rotr(x,19) ^ (x>>>10); }
    function S0(x){ return rotr(x,2) ^ rotr(x,13) ^ rotr(x,22); }
    function S1(x){ return rotr(x,6) ^ rotr(x,11) ^ rotr(x,25); }

    const ml = msgBytes.length;
    const bitLenHi = Math.floor((ml * 8) / 0x100000000);
    const bitLenLo = (ml * 8) >>> 0;
    const withOne = ml + 1;
    let padLen = (withOne % 64 <= 56) ? (56 - (withOne % 64)) : (56 + 64 - (withOne % 64));
    const totalLen = withOne + padLen + 8;
    const m = new Uint8Array(totalLen);
    m.set(msgBytes, 0); m[ml] = 0x80;
    const dv = new DataView(m.buffer);
    dv.setUint32(totalLen - 8, bitLenHi, false); dv.setUint32(totalLen - 4, bitLenLo, false);

    let a=0x6a09e667,b=0xbb67ae85,c=0x3c6ef372,d=0xa54ff53a;
    let e=0x510e527f,f=0x9b05688c,g=0x1f83d9ab,h=0x5be0cd19;

    const W = new Uint32Array(64);
    for(let off=0; off<m.length; off+=64){
      for(let i=0;i<16;i++) W[i]=dv.getUint32(off+i*4,false);
      for(let i=16;i<64;i++) W[i]=(s1(W[i-2]) + W[i-7] + s0(W[i-15]) + W[i-16])>>>0;
      let A=a,B=b,C=c,D=d,E=e,F=f,G=g,H=h;
      for(let i=0;i<64;i++){
        const t1=(H + S1(E) + ch(E,F,G) + K[i] + W[i])>>>0;
        const t2=(S0(A) + maj(A,B,C))>>>0;
        H=G;G=F;F=E;E=(D + t1)>>>0;D=C;C=B;B=A;A=(t1 + t2)>>>0;
      }
      a=(a+A)>>>0;b=(b+B)>>>0;c=(c+C)>>>0;d=(d+D)>>>0;
      e=(e+E)>>>0;f=(f+F)>>>0;g=(g+G)>>>0;h=(h+H)>>>0;
    }

    const out = new Uint8Array(32);
    const odv = new DataView(out.buffer);
    odv.setUint32(0,a,false);odv.setUint32(4,b,false);odv.setUint32(8,c,false);odv.setUint32(12,d,false);
    odv.setUint32(16,e,false);odv.setUint32(20,f,false);odv.setUint32(24,g,false);odv.setUint32(28,h,false);
    return out;
  }

  function utf8Bytes(str){ return new TextEncoder().encode(String(str ?? "")); }

  function deriveEncryptionMaskBytes(password, neededBytes){
    const out = new Uint8Array(neededBytes);
    let filled = 0;
    let h = sha256Bytes(utf8Bytes(password));
    while (filled < neededBytes) {
      const take = Math.min(32, neededBytes - filled);
      out.set(h.subarray(0, take), filled);
      filled += take;
      if (filled >= neededBytes) break;
      h = sha256Bytes(h);
    }
    return out;
  }

  // =========================
  // DOM / Canvas
  // =========================
  const video = document.getElementById('video');
  const overlayCanvas = document.getElementById('overlayCanvas');
  const ctx = overlayCanvas.getContext('2d');

  const zxingCanvas = document.createElement('canvas');   // フルフレーム
  const zxingCtx = zxingCanvas.getContext('2d', { willReadFrequently: true });

  const workCanvas = document.createElement('canvas');    // ROI
  const workCtx = workCanvas.getContext('2d', { willReadFrequently: true });

  // ★追加：first領域を塗り潰したフレーム（第2QR用）
  const maskedCanvas = document.createElement('canvas');
  const maskedCtx = maskedCanvas.getContext('2d', { willReadFrequently: true });

  // =========================
  // State
  // =========================
  let isProcessing = false;
  let isScanning = false;
  let lastDetectTime = 0;
  const SCAN_INTERVAL_MS = 200;

  let firstQR = null;
  let secondQR = null;

  let appPassword = null;
  let appMask = null;

  // ★重要：毎回 Array.from しない（速度改善）
  let appMaskArr = null;

  // =========================
  // ★追加：first追跡（緑枠が固まらないため）
  // =========================
  let lastFirstSeenAt = 0;
  let lastFirstTrackAt = 0;
  const FIRST_TRACK_INTERVAL_MS = 120;   // first追跡頻度
  const FIRST_LOST_RESET_MS = 1500;      // first見失いリセット猶予

  // =========================
  // Start / Password
  // =========================
  async function startApp() {
    const btn = document.getElementById('startBtn');
    btn.disabled = true;
    btn.innerText = "準備中...";

    if (typeof jsQR === 'undefined') {
      alert("jsQR.jsの読み込みに失敗しました。");
      btn.disabled = false;
      btn.innerText = "📷 カメラを起動する";
      return;
    }

    document.getElementById('detectorInfo').innerText = "⚡ エンジン: カスタム jsQR (管理部+XOR対応)";

    try {
      // ★解像度の理想値を指定（感度改善）
      const candidates = [
        { video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false },
        { video: { facingMode: { ideal: "environment" } }, audio: false },
        { video: true, audio: false },
      ];

      let stream = null, lastErr = null;
      for (const c of candidates) {
        try { stream = await navigator.mediaDevices.getUserMedia(c); break; }
        catch (e) { lastErr = e; }
      }
      if (!stream) throw lastErr || new Error("getUserMedia failed");

      video.srcObject = stream;

      await new Promise(resolve => {
        const to = setTimeout(resolve, 1200);
        video.onloadedmetadata = () => { clearTimeout(to); resolve(); };
      });

      await video.play().catch(e => console.warn(e));

      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('cameraContainer').style.display = 'block';
      document.getElementById('statusPanel').style.display = 'block';

      isScanning = true;
      requestAnimationFrame(scanLoop);
    } catch (err) {
      alert("カメラエラー: " + (err?.message || err));
      btn.disabled = false;
      btn.innerText = "📷 カメラを起動する";
    }
  }

  function showPasswordScreen() {
    isScanning = false;
    document.getElementById('appPasswordInput').value = "";
    document.getElementById('passwordScreen').style.display = 'flex';
  }

  function submitPassword() {
    const pw = document.getElementById('appPasswordInput').value;
    if (pw) {
      appPassword = pw;
      appMask = deriveEncryptionMaskBytes(appPassword, 5000);
      appMaskArr = Array.from(appMask); // ★ここで1回だけ作る
    }
    document.getElementById('passwordScreen').style.display = 'none';
    isScanning = true;
    lastDetectTime = Date.now();
    requestAnimationFrame(scanLoop);
  }

  window.startApp = startApp;
  window.submitPassword = submitPassword;

  // =========================
  // Geometry / Helpers
  // =========================
  function getCenter(points) {
    if (!points || points.length === 0) return { x: 0, y: 0 };
    let sumX = 0, sumY = 0;
    points.forEach(p => { sumX += p.x; sumY += p.y; });
    return { x: sumX / points.length, y: sumY / points.length };
  }

  function getDistance(p1, p2) {
    const dx = p1.x - p2.x, dy = p1.y - p2.y;
    return Math.sqrt(dx*dx + dy*dy);
  }

  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

  function bboxFromPoints(points) {
    if (!points || points.length === 0) return null;
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const p of points) {
      minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
      maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
    }
    const pad = 14;
    return {
      x: Math.max(0, minX - pad),
      y: Math.max(0, minY - pad),
      w: (maxX - minX) + pad * 2,
      h: (maxY - minY) + pad * 2
    };
  }

  function mapLocationToPoints(loc, sx, sy, scale) {
    const inv = 1 / scale;
    const tl = loc.topLeftCorner, tr = loc.topRightCorner, br = loc.bottomRightCorner, bl = loc.bottomLeftCorner;
    return [
      { x: tl.x * inv + sx, y: tl.y * inv + sy },
      { x: tr.x * inv + sx, y: tr.y * inv + sy },
      { x: br.x * inv + sx, y: br.y * inv + sy },
      { x: bl.x * inv + sx, y: bl.y * inv + sy },
    ];
  }

  function estimateQrSize(item) {
    if (item?.points && item.points.length >= 2) return getDistance(item.points[0], item.points[1]);
    const bb = bboxFromPoints(item?.points || []);
    if (bb) return Math.max(bb.w, bb.h);
    return 0;
  }

  // ★距離判定（採用ロジック）
  function isDifferentSecondCandidate(first, cand) {
    if (!first || !cand) return false;
    if (!first.center || !cand.center) return false;

    if (cand.text && first.text && cand.text !== first.text) return true;

    const dist = getDistance(first.center, cand.center);
    const qrSize = estimateQrSize(cand) || estimateQrSize(first) || 0;
    const thr = Math.min(overlayCanvas.width * 0.1, qrSize * 0.45);
    return dist > thr;
  }

  // =========================
  // jsQR decode wrappers
  // =========================
  function jsqrDecode(imageData, useMask) {
    if (!useMask) {
      return jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "attemptBoth" });
    }
    if (appMaskArr) {
      return jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: "attemptBoth",
        appEncMask: appMaskArr
      });
    }
    return null;
  }

  // ★srcCanvas を渡せるように
  function decodeRegion(frameW, frameH, sx, sy, sw, sh, scale, useMask, srcCanvas = zxingCanvas) {
    sx = clamp(sx, 0, frameW - 2);
    sy = clamp(sy, 0, frameH - 2);
    sw = clamp(sw, 2, frameW - sx);
    sh = clamp(sh, 2, frameH - sy);

    const tw = Math.max(80, Math.floor(sw * scale));
    const th = Math.max(80, Math.floor(sh * scale));

    workCanvas.width = tw;
    workCanvas.height = th;
    workCtx.clearRect(0, 0, tw, th);

    workCtx.drawImage(srcCanvas, sx, sy, sw, sh, 0, 0, tw, th);

    const img = workCtx.getImageData(0, 0, tw, th);
    const code = jsqrDecode(img, useMask);
    if (!code) return null;

    const pts = mapLocationToPoints(code.location, sx, sy, scale);
    return {
      text: code.data,
      managementCode: code.managementCode,
      points: pts,
      center: getCenter(pts),
      _usedMask: useMask
    };
  }

  function findFirstRobust(frameW, frameH, useMask, srcCanvas = zxingCanvas) {
    const fullScales = [1.0, 0.86, 1.18];
    for (const sc of fullScales) {
      const got = decodeRegion(frameW, frameH, 0, 0, frameW, frameH, sc, useMask, srcCanvas);
      if (got) return got;
    }

    const tileRatios = [0.72, 0.62];
    const scales = [1.0, 1.18];

    for (const tr of tileRatios) {
      const tw = Math.floor(frameW * tr);
      const th = Math.floor(frameH * tr);

      const positions = [
        { x: (frameW - tw) / 2, y: (frameH - th) / 2 },
        { x: 0, y: 0 }, { x: frameW - tw, y: 0 }, { x: 0, y: frameH - th }, { x: frameW - tw, y: frameH - th },
        { x: (frameW - tw) / 2, y: 0 }, { x: (frameW - tw) / 2, y: frameH - th },
        { x: 0, y: (frameH - th) / 2 }, { x: frameW - tw, y: (frameH - th) / 2 },
      ];

      for (const pos of positions) {
        for (const sc of scales) {
          const got = decodeRegion(frameW, frameH, Math.floor(pos.x), Math.floor(pos.y), tw, th, sc, useMask, srcCanvas);
          if (got) return got;
        }
      }
    }
    return null;
  }

  function decodeFullFrameExcludingFirst(first, frameW, frameH, useMask, srcCanvas = zxingCanvas) {
    if (!first?.points) return null;
    const bb = bboxFromPoints(first.points);
    if (!bb) return null;

    const pad = 20;
    const ex = {
      x: Math.max(0, bb.x - pad),
      y: Math.max(0, bb.y - pad),
      w: Math.min(frameW, bb.w + pad * 2),
      h: Math.min(frameH, bb.h + pad * 2),
    };

    const tileRatios = [0.72, 0.62];
    const scales = [1.0, 1.18];

    for (const tr of tileRatios) {
      const tw = Math.floor(frameW * tr);
      const th = Math.floor(frameH * tr);

      const positions = [
        { x: (frameW - tw) / 2, y: (frameH - th) / 2 },
        { x: 0, y: 0 }, { x: frameW - tw, y: 0 }, { x: 0, y: frameH - th }, { x: frameW - tw, y: frameH - th },
        { x: (frameW - tw) / 2, y: 0 }, { x: (frameW - tw) / 2, y: frameH - th },
        { x: 0, y: (frameH - th) / 2 }, { x: frameW - tw, y: (frameH - th) / 2 },
      ];

      for (const pos of positions) {
        const sx = Math.floor(pos.x), sy = Math.floor(pos.y);

        const overlapX = Math.max(0, Math.min(sx + tw, ex.x + ex.w) - Math.max(sx, ex.x));
        const overlapY = Math.max(0, Math.min(sy + th, ex.y + ex.h) - Math.max(sy, ex.y));
        const overlapArea = overlapX * overlapY;
        const tileArea = tw * th;
        if (tileArea > 0 && overlapArea / tileArea > 0.35) continue;

        for (const sc of scales) {
          const got = decodeRegion(frameW, frameH, sx, sy, tw, th, sc, useMask, srcCanvas);
          if (got && isDifferentSecondCandidate(first, got)) return got;
        }
      }
    }
    return null;
  }

  function findSecondByDistance(first, frameW, frameH, useMask, srcCanvas = zxingCanvas) {
    if (!first?.center) return null;

    const cx = first.center.x;
    const cy = first.center.y;

    const baseSize = Math.max(estimateQrSize(first), 180);
    const radiiKs = [1.0, 1.5, 2.1];
    const roiSizes = [
      clamp(baseSize * 1.35, 160, 560),
      clamp(baseSize * 1.70, 220, 720),
    ];
    const scales = [1.18, 1.0, 0.86];

    const N = 14;
    for (const roi of roiSizes) {
      for (const k of radiiKs) {
        const r = baseSize * k;
        for (let i = 0; i < N; i++) {
          const ang = (Math.PI * 2 * i) / N;
          const tx = cx + Math.cos(ang) * r;
          const ty = cy + Math.sin(ang) * r;
          const sx = Math.floor(tx - roi / 2);
          const sy = Math.floor(ty - roi / 2);

          for (const sc of scales) {
            const got = decodeRegion(frameW, frameH, sx, sy, roi, roi, sc, useMask, srcCanvas);
            if (got && isDifferentSecondCandidate(first, got)) return got;
          }
        }
      }
    }
    return null;
  }

  // =========================
  // ★追加：first追跡（緑枠が固まらない）
  // =========================
  function trackFirstQuick(frameW, frameH) {
    if (!firstQR?.points) return false;

    const bb = bboxFromPoints(firstQR.points);
    if (!bb) return false;

    const pad = Math.max(40, Math.floor(Math.max(bb.w, bb.h) * 0.35));
    const sx = Math.floor(bb.x - pad);
    const sy = Math.floor(bb.y - pad);
    const sw = Math.floor(bb.w + pad * 2);
    const sh = Math.floor(bb.h + pad * 2);

    const scales = [1.18, 1.0];

    // まずマスク無し（first追跡向き）
    for (const sc of scales) {
      const got = decodeRegion(frameW, frameH, sx, sy, sw, sh, sc, false, zxingCanvas);
      if (got && !isDifferentSecondCandidate(firstQR, got)) {
        firstQR.points = got.points;
        firstQR.center = got.center;
        firstQR.managementCode = got.managementCode;
        lastFirstSeenAt = Date.now();
        return true;
      }
    }

    // うまくいかない時だけマスクありも試す
    if (appMaskArr) {
      for (const sc of scales) {
        const got = decodeRegion(frameW, frameH, sx, sy, sw, sh, sc, true, zxingCanvas);
        if (got && !isDifferentSecondCandidate(firstQR, got)) {
          firstQR.points = got.points;
          firstQR.center = got.center;
          firstQR.managementCode = got.managementCode;
          lastFirstSeenAt = Date.now();
          return true;
        }
      }
    }

    return false;
  }

  // =========================
  // ★追加：first領域を塗り潰して第2を再デコード
  // =========================
  function buildMaskedFrameFromFirst(first, frameW, frameH, fill = "black") {
    maskedCanvas.width = frameW;
    maskedCanvas.height = frameH;

    maskedCtx.clearRect(0, 0, frameW, frameH);
    maskedCtx.drawImage(zxingCanvas, 0, 0);

    const bb = bboxFromPoints(first?.points || []);
    if (!bb) return;

    const pad = 24;
    const x = clamp(Math.floor(bb.x - pad), 0, frameW - 1);
    const y = clamp(Math.floor(bb.y - pad), 0, frameH - 1);
    const w = clamp(Math.floor(bb.w + pad*2), 1, frameW - x);
    const h = clamp(Math.floor(bb.h + pad*2), 1, frameH - y);

    maskedCtx.save();
    maskedCtx.globalCompositeOperation = "source-over";
    maskedCtx.fillStyle = (fill === "white") ? "#ffffff" : "#000000";
    maskedCtx.fillRect(x, y, w, h);
    maskedCtx.restore();
  }

  function findSecondWithFirstMasked(first, frameW, frameH, useMask) {
    let got = findFirstRobust(frameW, frameH, useMask, maskedCanvas);
    if (got && isDifferentSecondCandidate(first, got)) return got;

    got = decodeRegion(frameW, frameH, 0, 0, frameW, frameH, 0.92, useMask, maskedCanvas);
    if (got && isDifferentSecondCandidate(first, got)) return got;

    got = findSecondByDistance(first, frameW, frameH, useMask, maskedCanvas);
    if (got && isDifferentSecondCandidate(first, got)) return got;

    return null;
  }

  // =========================
  // Main loop
  // =========================
  async function scanLoop() {
    if (!isScanning) return;

    if (video.videoWidth && overlayCanvas.width !== video.videoWidth) {
      overlayCanvas.width = video.videoWidth;
      overlayCanvas.height = video.videoHeight;
    }

    ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
    if (firstQR) drawBoundingBox(firstQR.points, '#00E676');
    if (secondQR) drawBoundingBox(secondQR.points, '#29B6F6');

    const now = Date.now();
    if (!isProcessing && (now - lastDetectTime) > SCAN_INTERVAL_MS && video.readyState >= 2) {
      isProcessing = true;
      lastDetectTime = now;

      let detectedItems = [];

      try {
        zxingCanvas.width = overlayCanvas.width;
        zxingCanvas.height = overlayCanvas.height;
        zxingCtx.drawImage(video, 0, 0, zxingCanvas.width, zxingCanvas.height);

        const W = zxingCanvas.width;
        const H = zxingCanvas.height;

        // =========================
        // ★追加：first追跡（緑枠の固定を防ぐ）
        // ※③ first領域マスク→再デコード を崩さず、その前に追従させる
        // =========================
        if (firstQR && !secondQR) {
          const t = Date.now();
          if (t - lastFirstTrackAt >= FIRST_TRACK_INTERVAL_MS) {
            lastFirstTrackAt = t;
            const ok = trackFirstQuick(W, H);
            if (!ok && (t - lastFirstSeenAt) > FIRST_LOST_RESET_MS) {
              firstQR = null;
              document.getElementById('text1').innerText = "未検出";
              document.getElementById('mg1').innerText = "--";
            }
          }
        }

        let item = null;
        let usedMask = false;

        // -------------------------
        // (A) first が未確定：まず1個取る（多段探索）
        // -------------------------
        if (!firstQR) {
          item = findFirstRobust(W, H, false, zxingCanvas);
          if (item) lastFirstSeenAt = Date.now();
          if (!item && appMaskArr) { item = findFirstRobust(W, H, true, zxingCanvas); usedMask = !!item; if (item) lastFirstSeenAt = Date.now(); }
          else usedMask = false;
        } else {
          // -------------------------
          // (B) first がある：軽い追跡（フル縮小）で更新／同フレームで2個目が紛れて取れるのを拾う
          // -------------------------
          const got = decodeRegion(W, H, 0, 0, W, H, 0.92, false, zxingCanvas)
                   || (appMaskArr ? decodeRegion(W, H, 0, 0, W, H, 0.92, true, zxingCanvas) : null);
          if (got) {
            item = got;
            usedMask = !!got._usedMask;
          }

          // -------------------------
          // (C) second が未確定：ここが本丸
          //     1) first領域を塗り潰して（黒→白）再デコード
          //     2) ダメなら従来：除外→距離探索
          // -------------------------
          if (firstQR && !secondQR) {
            let found = null;

            // ★(C-1) first領域マスク→再デコード（黒）
            buildMaskedFrameFromFirst(firstQR, W, H, "black");
            found = findSecondWithFirstMasked(firstQR, W, H, false);
            if (!found && appMaskArr) found = findSecondWithFirstMasked(firstQR, W, H, true);

            // ★(C-2) 白塗りも試す
            if (!found) {
              buildMaskedFrameFromFirst(firstQR, W, H, "white");
              found = findSecondWithFirstMasked(firstQR, W, H, false);
              if (!found && appMaskArr) found = findSecondWithFirstMasked(firstQR, W, H, true);
            }

            // ★(C-3) それでもダメなら既存の「除外→距離探索」
            if (!found) {
              found = decodeFullFrameExcludingFirst(firstQR, W, H, false, zxingCanvas);
              if (!found && appMaskArr) found = decodeFullFrameExcludingFirst(firstQR, W, H, true, zxingCanvas);

              if (!found) {
                found = findSecondByDistance(firstQR, W, H, false, zxingCanvas);
                if (!found && appMaskArr) found = findSecondByDistance(firstQR, W, H, true, zxingCanvas);
              }
            }

            if (found) {
              item = found;
              usedMask = !!found._usedMask;
            }
          }
        }

        // -------------------------
        // 登録（既存の流れを維持）
        // -------------------------
        if (item) {
          const mgmtStr = item.managementCode !== undefined
            ? item.managementCode.toString(2).padStart(16, '0')
            : "0000000000000000";

          // 既存仕様：第1QR（マスク無しで読めた）かつ 暗号化フラグON → パスワード要求
          if (!usedMask && mgmtStr[7] === '1') {
            if (!appPassword && document.getElementById('passwordScreen').style.display !== 'flex') {
              detectedItems = [{
                text: item.text,
                managementCode: item.managementCode,
                points: item.points,
                center: item.center
              }];
              processDetections(detectedItems);

              showPasswordScreen();
              isProcessing = false;
              return;
            }
          }

          detectedItems = [{
            text: item.text,
            managementCode: item.managementCode,
            points: item.points,
            center: item.center
          }];
        }
      } catch (err) {
        // ここは静かに無視（既存仕様）
      }

      processDetections(detectedItems);
      isProcessing = false;
    }

    if (firstQR && secondQR) {
      showResultScreen();
      isScanning = false;
      return;
    }

    requestAnimationFrame(scanLoop);
  }

  // =========================
  // Existing detection handling (維持)
  // =========================
  function processDetections(items) {
    if (items.length === 0) return;

    if (items.length >= 2) {
      if (!firstQR) { firstQR = items[0]; secondQR = items[1]; lastFirstSeenAt = Date.now(); updateUI(); return; }
      if (firstQR && !secondQR) {
        const dist0 = getDistance(firstQR.center, items[0].center);
        const dist1 = getDistance(firstQR.center, items[1].center);
        if (dist0 > dist1) { secondQR = items[0]; firstQR = items[1]; }
        else { secondQR = items[1]; firstQR = items[0]; }
        lastFirstSeenAt = Date.now();
        updateUI(); return;
      }
    }

    if (items.length === 1) {
      const item = items[0];
      if (!firstQR) { firstQR = item; lastFirstSeenAt = Date.now(); updateUI(); }
      else if (!secondQR) {
        if (item.text !== firstQR.text) { secondQR = item; updateUI(); }
        else {
          const dist = getDistance(firstQR.center, item.center);
          const qrSize = getDistance(item.points[0], item.points[1]);
          if (dist > Math.min(overlayCanvas.width * 0.1, qrSize * 0.45)) { secondQR = item; updateUI(); }
          else { firstQR.points = item.points; firstQR.center = item.center; lastFirstSeenAt = Date.now(); }
        }
      }
    }
  }

  function updateUI() {
    if (firstQR) {
      document.getElementById('text1').innerText = firstQR.text;
      document.getElementById('mg1').innerText = firstQR.managementCode !== undefined ? firstQR.managementCode.toString(2).padStart(16, '0') : "なし";
    }
    if (secondQR) {
      document.getElementById('text2').innerText = secondQR.text;
      document.getElementById('mg2').innerText = secondQR.managementCode !== undefined ? secondQR.managementCode.toString(2).padStart(16, '0') : "なし";
    }
  }

  function formatResultText(text) {
    if (/^https?:\/\//i.test(text)) return `<a href="${text}" target="_blank" style="color: #03DAC6; text-decoration: underline;">${text}</a>`;
    const div = document.createElement('div'); div.innerText = text; return div.innerHTML;
  }

  function showResultScreen() {
    if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
    document.getElementById('cameraContainer').style.display = 'none';
    document.getElementById('statusPanel').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';
    document.getElementById('finalText1').innerHTML = formatResultText(firstQR.text);
    document.getElementById('finalText2').innerHTML = formatResultText(secondQR.text);
    document.getElementById('finalMg1').innerText = firstQR.managementCode !== undefined ? firstQR.managementCode.toString(2).padStart(16, '0') : "なし";
    document.getElementById('finalMg2').innerText = secondQR.managementCode !== undefined ? secondQR.managementCode.toString(2).padStart(16, '0') : "なし";
  }

  function goBack() {
    firstQR = null; secondQR = null; appPassword = null; appMask = null; appMaskArr = null;

    // ★追加：first追跡状態もリセット
    lastFirstSeenAt = 0;
    lastFirstTrackAt = 0;

    document.getElementById('text1').innerText = "未検出"; document.getElementById('text2').innerText = "未検出";
    document.getElementById('mg1').innerText = "--"; document.getElementById('mg2').innerText = "--";
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('cameraContainer').style.display = 'block';
    document.getElementById('statusPanel').style.display = 'block';
    ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
    isScanning = true; requestAnimationFrame(scanLoop);
  }

  window.goBack = goBack;

  function drawBoundingBox(points, color) {
    if (!points || points.length < 3) return;
    ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
    ctx.closePath(); ctx.lineWidth = 6; ctx.strokeStyle = color; ctx.stroke();
    ctx.fillStyle = color + '44'; ctx.fill();
  }
</script>
