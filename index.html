<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QRツイン リーダー</title>

  <meta name="apple-mobile-web-app-title" content="QRツイン">
  <meta name="application-name" content="QRツイン">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="icon" type="image/png" sizes="512x512" href="icon.png">
  <link rel="manifest" href="manifest.json">

  <script src="./jsQR.js"></script>

  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: #121212; color: #ffffff; text-align: center; }
    h2 { margin: 15px 0; font-size: 1.2rem; }

    #startScreen, #resultScreen { padding: 20px; margin-top: 50px; }
    #resultScreen { display: none; }

    .camera-container { position: relative; width: 100%; max-width: 600px; margin: 0 auto; background: #000; display: none; }
    video { width: 100%; display: block; object-fit: cover; }
    canvas#overlayCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

    .status-panel { padding: 15px; background: #1e1e1e; border-top: 1px solid #333; text-align: left; max-width: 600px; margin: 0 auto; display: none; }
    .qr-result { margin-bottom: 10px; padding: 10px; border-radius: 8px; background: #2c2c2c; word-break: break-all; }
    .qr-1 { border-left: 5px solid #00E676; }
    .qr-2 { border-left: 5px solid #29B6F6; }

    button { width: 100%; max-width: 300px; padding: 15px; font-size: 1.1rem; font-weight: bold; background: #6200EE; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    button:disabled { background: #555; cursor: not-allowed; color: #aaa; }

    #startBtn { background: #81C784; color: #121212; }
    #startBtn:active { background: #66BB6A; }
    #backBtn { background: #03DAC6; color: #000; margin-top: 30px; }
    #backBtn:active { background: #018786; }

    .hint { font-size: 0.85rem; color: #9fb0c7; margin: 6px 0 0 0; }
  </style>
</head>

<body>
  <!-- Password Overlay -->
  <div id="passwordScreen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.82); z-index:1000; justify-content:center; align-items:center;">
    <div style="background:#1e1e1e; padding:20px; border-radius:10px; width:80%; max-width:420px; text-align:center; border:1px solid #333;">
      <h3 style="color:#03DAC6; margin-top:0;">🔒 パスワード入力</h3>
      <p style="font-size:0.9rem; color:#aaa; margin-bottom:16px;">
        第2のQRコードはアプリ暗号化されています。<br>
        ※第1QR＋第2QR(RAW) の取得が完了した時だけ、この画面が出ます。
      </p>
      <input type="password" id="appPasswordInput" placeholder="パスワード"
             style="width:100%; padding:12px; margin-bottom:12px; border-radius:6px; border:1px solid #555; background:#2c2c2c; color:#fff; box-sizing:border-box; font-size:1rem;">
      <button onclick="submitPassword()" style="background:#00E676; color:#000; width:100%; padding:12px; border-radius:8px; font-weight:bold; font-size:1.1rem; border:none;">
        復号して表示
      </button>
      <div class="hint" id="pwHint"></div>
    </div>
  </div>

  <h2>📱 QRツイン リーダー</h2>

  <div id="startScreen">
    <p style="color:#aaa; font-size:0.9rem; margin-bottom:20px;">
      QRツイン（2つ重ね）を読み取ります。暗号化の場合は「第2のRAW」を先に確保してからパスワード入力に進みます。
    </p>
    <button id="startBtn" onclick="startApp()">📷 カメラを起動する</button>
    <div class="hint">※高速化：デコードは縮小解像度で実行します</div>
  </div>

  <div class="camera-container" id="cameraContainer">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="overlayCanvas"></canvas>
  </div>

  <div class="status-panel" id="statusPanel">
    <div id="detectorInfo" style="font-size:0.8rem; color:#aaa; margin-bottom:10px;">読取エンジン準備中...</div>

    <div class="qr-result qr-1">
      <strong>1個目:</strong> <span id="text1">未検出</span><br>
      <span style="font-size:0.85em; color:#ccc;">管理部16bit: <span id="mg1">--</span></span>
    </div>

    <div class="qr-result qr-2">
      <strong>2個目:</strong> <span id="text2">未検出</span><br>
      <span style="font-size:0.85em; color:#ccc;">管理部16bit: <span id="mg2">--</span></span>
    </div>

    <div class="hint" id="stageHint"></div>
  </div>

  <div id="resultScreen">
    <h3 style="color:#00E676; margin-bottom:20px;">✅ 読み取り完了！</h3>

    <div class="qr-result qr-1" style="text-align:left;">
      <strong>1個目:</strong><br> <span id="finalText1"></span><br>
      <span style="font-size:0.9em; color:#ffeb3b;">管理部16bit: <span id="finalMg1">--</span></span>
    </div>

    <div class="qr-result qr-2" style="text-align:left;">
      <strong>2個目:</strong><br> <span id="finalText2"></span><br>
      <span style="font-size:0.9em; color:#ffeb3b;">管理部16bit: <span id="finalMg2">--</span></span>
    </div>

    <button id="backBtn" onclick="goBack()">🔙 もとのカメラ画面に戻る</button>
  </div>

<script>
/* ---------------------------
   SHA-256 (bytes)
--------------------------- */
function sha256Bytes(msgBytes){
  const K = new Uint32Array([
    0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
    0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
    0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
    0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
    0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
    0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
    0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
    0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
  ]);
  function rotr(x,n){ return (x>>>n) | (x<<(32-n)); }
  function ch(x,y,z){ return (x & y) ^ (~x & z); }
  function maj(x,y,z){ return (x & y) ^ (x & z) ^ (y & z); }
  function s0(x){ return rotr(x,7) ^ rotr(x,18) ^ (x>>>3); }
  function s1(x){ return rotr(x,17) ^ rotr(x,19) ^ (x>>>10); }
  function S0(x){ return rotr(x,2) ^ rotr(x,13) ^ rotr(x,22); }
  function S1(x){ return rotr(x,6) ^ rotr(x,11) ^ rotr(x,25); }

  const ml = msgBytes.length;
  const bitLenHi = Math.floor((ml * 8) / 0x100000000);
  const bitLenLo = (ml * 8) >>> 0;
  const withOne = ml + 1;
  let padLen = (withOne % 64 <= 56) ? (56 - (withOne % 64)) : (56 + 64 - (withOne % 64));
  const totalLen = withOne + padLen + 8;
  const m = new Uint8Array(totalLen);
  m.set(msgBytes, 0); m[ml] = 0x80;
  const dv = new DataView(m.buffer);
  dv.setUint32(totalLen - 8, bitLenHi, false); dv.setUint32(totalLen - 4, bitLenLo, false);

  let a=0x6a09e667,b=0xbb67ae85,c=0x3c6ef372,d=0xa54ff53a;
  let e=0x510e527f,f=0x9b05688c,g=0x1f83d9ab,h=0x5be0cd19;

  const W = new Uint32Array(64);
  for(let off=0; off<m.length; off+=64){
    for(let i=0;i<16;i++) W[i]=dv.getUint32(off+i*4,false);
    for(let i=16;i<64;i++) W[i]=(s1(W[i-2]) + W[i-7] + s0(W[i-15]) + W[i-16])>>>0;
    let A=a,B=b,C=c,D=d,E=e,F=f,G=g,H=h;
    for(let i=0;i<64;i++){
      const t1=(H + S1(E) + ch(E,F,G) + K[i] + W[i])>>>0;
      const t2=(S0(A) + maj(A,B,C))>>>0;
      H=G;G=F;F=E;E=(D + t1)>>>0;D=C;C=B;B=A;A=(t1 + t2)>>>0;
    }
    a=(a+A)>>>0;b=(b+B)>>>0;c=(c+C)>>>0;d=(d+D)>>>0;
    e=(e+E)>>>0;f=(f+F)>>>0;g=(g+G)>>>0;h=(h+H)>>>0;
  }

  const out = new Uint8Array(32);
  const odv = new DataView(out.buffer);
  odv.setUint32(0,a,false);odv.setUint32(4,b,false);odv.setUint32(8,c,false);odv.setUint32(12,d,false);
  odv.setUint32(16,e,false);odv.setUint32(20,f,false);odv.setUint32(24,g,false);odv.setUint32(28,h,false);
  return out;
}
function utf8Bytes(str){ return new TextEncoder().encode(String(str ?? "")); }
function deriveEncryptionMaskBytes(password, neededBytes){
  const out = new Uint8Array(neededBytes);
  let filled = 0;
  let h = sha256Bytes(utf8Bytes(password));
  while (filled < neededBytes) {
    const take = Math.min(32, neededBytes - filled);
    out.set(h.subarray(0, take), filled);
    filled += take;
    if (filled >= neededBytes) break;
    h = sha256Bytes(h);
  }
  return out;
}

/* ---------------------------
   DOM / Canvas
--------------------------- */
const video = document.getElementById('video');
const overlayCanvas = document.getElementById('overlayCanvas');
const octx = overlayCanvas.getContext('2d');

const scanCanvas = document.createElement('canvas');
const sctx = scanCanvas.getContext('2d', { willReadFrequently: true });

let isProcessing = false;
let isScanning = false;
let lastDetectTime = 0;

/* 高速化：スキャン間隔をやや緩めて安定（ここは端末により調整） */
const SCAN_INTERVAL_MS = 90;

/* スキャン縮小：長辺をこのpxに揃える（大きいほど精度↑だが遅くなる） */
const SCAN_MAX_DIM = 960;

/* “段階式探索” の状態 */
let failStreak = 0;        // 連続失敗回数
let heavyMode = false;     // 重い前処理を使うか
const HEAVY_ENTER = 10;    // 失敗が10回続いたら重モード
const HEAVY_EXIT  = 2;     // 成功が出たら軽モードに戻す

let firstQR = null;   // {text, managementCode, points, center, location}
let secondQR = null;  // 同上（復号済み or 非暗号）

let appPassword = null;

/* 改良復号方式：第2QRのRAWを保存しておき、パス入力後に即復号 */
let savedSecondQrRawData = null;   // extractRawOnly の戻り
let savedSecondQrPoints = null;    // 描画用
let needEncryptedSecond = false;   // 第1QRの管理部で暗号化がONだった

function setHint(msg){ document.getElementById('stageHint').innerText = msg || ""; }

/* ---------------------------
   Start / UI
--------------------------- */
async function startApp() {
  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').innerText = "準備中...";
  if (typeof jsQR === 'undefined') {
    alert("jsQR.jsの読み込みに失敗しました。");
    return;
  }

  document.getElementById('detectorInfo').innerText =
    "⚡ エンジン: カスタム jsQR（段階探索 + 第2RAW先取り + Finderのみマスク）";

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }
    });
    video.srcObject = stream;

    // 体感遅延の元になっていた 1秒待ちは廃止（metadataを待って即開始）
    await new Promise(resolve => { video.onloadedmetadata = resolve; });
    await video.play().catch(()=>{});

    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('cameraContainer').style.display = 'block';
    document.getElementById('statusPanel').style.display = 'block';

    isScanning = true;
    requestAnimationFrame(scanLoop);
  } catch (err) {
    alert("カメラエラー: " + err.message);
    document.getElementById('startBtn').disabled = false;
    document.getElementById('startBtn').innerText = "📷 カメラを起動する";
  }
}

function showPasswordScreen() {
  // 「第1 + 第2RAW が揃ったときだけ」ここに来る
  isScanning = false;
  document.getElementById('appPasswordInput').value = "";
  document.getElementById('pwHint').innerText = "第2QR(RAW)取得済み。パスワードで即復号します。";
  document.getElementById('passwordScreen').style.display = 'flex';
}

function submitPassword() {
  const pw = document.getElementById('appPasswordInput').value;
  if (!pw) return;

  if (!savedSecondQrRawData || !savedSecondQrRawData.codewords) {
    alert("第2QR(RAW)が未取得です。読み取り位置を調整して再試行してください。");
    document.getElementById('passwordScreen').style.display = 'none';
    isScanning = true;
    requestAnimationFrame(scanLoop);
    return;
  }

  appPassword = pw;

  // ★固定5000ではなく「第2QRのcodewords長」に合わせる（安全・高速・確実）
  const needed = savedSecondQrRawData.codewords.length;
  const appMask = deriveEncryptionMaskBytes(appPassword, needed);

  // ★再スキャンせず、その場で復号
  const decoded = jsQR.resumeDecode(savedSecondQrRawData, appMask);

  if (!decoded) {
    alert("パスワードが間違っているか、データの復号に失敗しました。");
    appPassword = null;
    return; // 画面は閉じず、再入力させる
  }

  secondQR = {
    text: decoded.text,
    managementCode: decoded.managementCode,
    points: savedSecondQrPoints,
    center: getCenter(savedSecondQrPoints),
    location: null
  };

  updateUI();
  document.getElementById('passwordScreen').style.display = 'none';
  showResultScreen();
}

/* ---------------------------
   Geometry helpers
--------------------------- */
function getCenter(points) {
  if (!points || points.length === 0) return { x: 0, y: 0 };
  let sumX = 0, sumY = 0;
  points.forEach(p => { sumX += p.x; sumY += p.y; });
  return { x: sumX / points.length, y: sumY / points.length };
}
function dist(a,b){
  const dx = a.x - b.x, dy = a.y - b.y;
  return Math.sqrt(dx*dx + dy*dy);
}
function getDistance(p1, p2) {
  return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
}
function bboxFromPoints(pts){
  let minX=1e9, minY=1e9, maxX=-1e9, maxY=-1e9;
  for(const p of pts){
    minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
    maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
  }
  return {minX,minY,maxX,maxY, w:maxX-minX, h:maxY-minY};
}

/* ---------------------------
   Image preprocessing (heavy mode only)
--------------------------- */
function toGrayscale(src) {
  const dst = new ImageData(new Uint8ClampedArray(src.data), src.width, src.height);
  for (let i = 0; i < dst.data.length; i += 4) {
    const g = Math.round(0.299 * dst.data[i] + 0.587 * dst.data[i+1] + 0.114 * dst.data[i+2]);
    dst.data[i] = dst.data[i+1] = dst.data[i+2] = g;
  }
  return dst;
}
function enhanceContrast(src, brightness, contrast) {
  const dst = new ImageData(new Uint8ClampedArray(src.data), src.width, src.height);
  const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
  for (let i = 0; i < dst.data.length; i += 4) {
    for (let c = 0; c < 3; c++) {
      let v = dst.data[i + c];
      v = factor * (v - 128) + 128 + brightness;
      dst.data[i + c] = Math.max(0, Math.min(255, v));
    }
  }
  return dst;
}
function sharpen(src) {
  const w = src.width, h = src.height;
  const dst = new ImageData(new Uint8ClampedArray(src.data), w, h);
  const kernel = [0,-1,0,-1,5,-1,0,-1,0];
  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      for (let c = 0; c < 3; c++) {
        let sum = 0;
        for (let ky = -1; ky <= 1; ky++) {
          for (let kx = -1; kx <= 1; kx++) {
            sum += src.data[((y+ky)*w+(x+kx))*4+c] * kernel[(ky+1)*3+(kx+1)];
          }
        }
        dst.data[(y*w+x)*4+c] = Math.max(0, Math.min(255, sum));
      }
    }
  }
  return dst;
}

/* ---------------------------
   Decode strategy
   - light: base + gray, inversion attemptBoth
   - heavy: add contrast/sharpen variants, still early-exit on first hit
--------------------------- */
function tryDecodeOne(imgData, opts){
  try { return jsQR(imgData.data, imgData.width, imgData.height, opts); } catch(_) { return null; }
}

function decodeStage(imgData, optsBase, wantRaw){
  const invModesLight = ["attemptBoth"]; // 軽量：これだけで十分なことが多い
  const invModesHeavy = ["attemptBoth","invertFirst","onlyInvert"];

  const base = imgData;
  const gray = toGrayscale(imgData);

  const variantsLight = [base, gray];
  const variantsHeavy = [
    base, gray,
    enhanceContrast(gray, 0, 80),
    enhanceContrast(gray, 20, 60),
    sharpen(gray),
    enhanceContrast(sharpen(gray), 0, 100),
  ];

  const variants = heavyMode ? variantsHeavy : variantsLight;
  const invModes = heavyMode ? invModesHeavy : invModesLight;

  for(const v of variants){
    for(const inv of invModes){
      const opts = Object.assign({}, optsBase, { inversionAttempts: inv });
      if (wantRaw) opts.extractRawOnly = true;
      const code = tryDecodeOne(v, opts);
      if (code) return code; // ★最初に当たったら即返す（爆速寄り）
    }
  }
  return null;
}

/* ---------------------------
   Finder-only mask (for first QR)
   - “全部マスク”はしない
   - Finder 3つだけ、少し大きめ角丸矩形で白塗り
--------------------------- */
function maskFirstQrFindersOnCanvas(ctx2d, first, scale){
  // scale: overlayCanvas->scanCanvas への変換係数
  const loc = first.location;
  if (!loc) return;

  const pts = [
    loc.topLeftFinderPattern || loc.topLeftCorner,
    loc.topRightFinderPattern || loc.topRightCorner,
    loc.bottomLeftFinderPattern || loc.bottomLeftCorner,
  ];

  // QRの大きさ推定（縮小後座標）
  const tl = {x: loc.topLeftCorner.x*scale, y: loc.topLeftCorner.y*scale};
  const tr = {x: loc.topRightCorner.x*scale, y: loc.topRightCorner.y*scale};
  const qrSize = Math.max(16, Math.hypot(tr.x - tl.x, tr.y - tl.y));

  // FinderはQRの角にあるので、半径（辺長）を少し大きめに取る
  const box = qrSize * 0.22; // 円0.15より強めに潰す（それでも“Finderだけ”）
  const r = box * 0.25;

  ctx2d.save();
  ctx2d.fillStyle = "#FFFFFF";

  for(const p of pts){
    const x = p.x*scale, y = p.y*scale;
    const left = x - box, top = y - box, w = box*2, h = box*2;

    // 角丸矩形
    ctx2d.beginPath();
    ctx2d.moveTo(left + r, top);
    ctx2d.arcTo(left + w, top, left + w, top + h, r);
    ctx2d.arcTo(left + w, top + h, left, top + h, r);
    ctx2d.arcTo(left, top + h, left, top, r);
    ctx2d.arcTo(left, top, left + w, top, r);
    ctx2d.closePath();
    ctx2d.fill();
  }

  ctx2d.restore();
}

/* ---------------------------
   Main scan loop
--------------------------- */
async function scanLoop(){
  if (!isScanning) return;

  // overlay canvas is full-res of video for drawing
  if (video.videoWidth && overlayCanvas.width !== video.videoWidth) {
    overlayCanvas.width = video.videoWidth;
    overlayCanvas.height = video.videoHeight;
  }

  octx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  if (firstQR) drawBoundingBox(firstQR.points, '#00E676');
  if (secondQR) drawBoundingBox(secondQR.points, '#29B6F6');

  const now = Date.now();
  if (!isProcessing && now - lastDetectTime > SCAN_INTERVAL_MS && video.readyState >= 2) {
    isProcessing = true;
    lastDetectTime = now;

    try {
      // ---- 1) スキャン用キャンバスに縮小描画 ----
      const vw = overlayCanvas.width, vh = overlayCanvas.height;
      const scale = Math.min(1, SCAN_MAX_DIM / Math.max(vw, vh));
      const sw = Math.max(240, Math.round(vw * scale));
      const sh = Math.max(240, Math.round(vh * scale));

      scanCanvas.width = sw;
      scanCanvas.height = sh;
      sctx.drawImage(video, 0, 0, sw, sh);

      const img = sctx.getImageData(0, 0, sw, sh);

      // ---- 2) 軽→重の段階切替 ----
      setHint(`mode=${heavyMode ? "heavy" : "light"} / failStreak=${failStreak}`);

      // ---- 3) 通常デコード（第1/第2(非暗号) を拾う）----
      let code = decodeStage(img, {}, false);

      if (code) {
        failStreak = 0;
        if (heavyMode) heavyMode = false;

        const pts = [
          code.location.topLeftCorner,
          code.location.topRightCorner,
          code.location.bottomRightCorner,
          code.location.bottomLeftCorner
        ].map(p => ({ x: p.x / scale, y: p.y / scale })); // overlay座標へ戻す

        const item = {
          text: code.data,
          managementCode: code.managementCode,
          points: pts,
          center: getCenter(pts),
          location: {
            // location も overlay座標へ戻して保持（Finderマスク用）
            topLeftCorner: {x: code.location.topLeftCorner.x / scale, y: code.location.topLeftCorner.y / scale},
            topRightCorner: {x: code.location.topRightCorner.x / scale, y: code.location.topRightCorner.y / scale},
            bottomRightCorner: {x: code.location.bottomRightCorner.x / scale, y: code.location.bottomRightCorner.y / scale},
            bottomLeftCorner: {x: code.location.bottomLeftCorner.x / scale, y: code.location.bottomLeftCorner.y / scale},
            topLeftFinderPattern: code.location.topLeftFinderPattern ? {x: code.location.topLeftFinderPattern.x / scale, y: code.location.topLeftFinderPattern.y / scale} : null,
            topRightFinderPattern: code.location.topRightFinderPattern ? {x: code.location.topRightFinderPattern.x / scale, y: code.location.topRightFinderPattern.y / scale} : null,
            bottomLeftFinderPattern: code.location.bottomLeftFinderPattern ? {x: code.location.bottomLeftFinderPattern.x / scale, y: code.location.bottomLeftFinderPattern.y / scale} : null,
            bottomRightAlignmentPattern: code.location.bottomRightAlignmentPattern ? {x: code.location.bottomRightAlignmentPattern.x / scale, y: code.location.bottomRightAlignmentPattern.y / scale} : null,
          }
        };

        // 第1QR判定：まだfirstが無い or “距離で別物”と判断
        if (!firstQR) {
          firstQR = item;
          updateUI();

          const mgmtStr = firstQR.managementCode !== undefined
            ? firstQR.managementCode.toString(2).padStart(16,'0')
            : "0000000000000000";

          needEncryptedSecond = (mgmtStr[7] === '1'); // あなたの仕様：mgmtStr[7] が暗号化フラグ

        } else if (!secondQR) {
          // 既にfirstがある場合、同一テキストでも距離が離れていれば second 扱い
          const d = dist(firstQR.center, item.center);
          const size = getDistance(firstQR.points[0], firstQR.points[1]);
          const threshold = Math.max(overlayCanvas.width * 0.10, size * 0.55);

          if (item.text !== firstQR.text || d > threshold) {
            secondQR = item;
            updateUI();
          } else {
            // 同一と判断：firstの追従だけ更新
            firstQR.points = item.points;
            firstQR.center = item.center;
            firstQR.location = item.location;
            updateUI();
          }
        }

        // 非暗号で2つ揃ったら終了
        if (firstQR && secondQR && !needEncryptedSecond) {
          showResultScreen();
          isScanning = false;
          isProcessing = false;
          return;
        }
      } else {
        // 失敗時：段階的に重モードへ
        failStreak++;
        if (failStreak >= HEAVY_ENTER) heavyMode = true;
      }

      // ---- 4) 暗号化ケース：第1QRが取れていて、第2RAWが未取得なら「同フレームで第2RAW探索」----
      // 条件：暗号化フラグON / 第2RAW未取得 / パス入力画面が出ていない
      const pwVisible = (document.getElementById('passwordScreen').style.display === 'flex');

      if (firstQR && needEncryptedSecond && !savedSecondQrRawData && !pwVisible) {
        // scanCanvas 上で Finderのみマスクして、第2を優先的に当てる
        const tmp = sctx.getImageData(0, 0, scanCanvas.width, scanCanvas.height);
        // マスクは tmp に対して描けないので、一度描画し直してから塗る
        sctx.putImageData(tmp, 0, 0);

        // Finder-only mask（overlay座標→scan座標に変換）
        maskFirstQrFindersOnCanvas(sctx, firstQR, scale);

        const img2 = sctx.getImageData(0, 0, sw, sh);

        // raw抽出
        const raw = decodeStage(img2, {}, true);

        if (raw && raw.location) {
          // ★「firstと別物」判定（ここが復号失敗の一番の原因対策）
          const rawPtsScan = [
            raw.location.topLeftCorner,
            raw.location.topRightCorner,
            raw.location.bottomRightCorner,
            raw.location.bottomLeftCorner
          ];
          const rawPts = rawPtsScan.map(p => ({ x: p.x / scale, y: p.y / scale }));
          const rawCenter = getCenter(rawPts);

          const d = dist(firstQR.center, rawCenter);
          const size = getDistance(firstQR.points[0], firstQR.points[1]);
          const threshold = Math.max(overlayCanvas.width * 0.12, size * 0.65);

          if (d > threshold) {
            // これを“第2RAW”として確定保存
            savedSecondQrRawData = raw;       // codewords/version/formatInfo を含む
            savedSecondQrPoints = rawPts;

            // ★要望：2つが揃うまでパスワード画面を出さない
            // → ここで firstQR + secondRAW が揃ったので表示
            updateUI();
            showPasswordScreen();

            isProcessing = false;
            return;
          }
        }
      }

    } catch (e) {
      console.warn(e);
    } finally {
      isProcessing = false;
    }
  }

  requestAnimationFrame(scanLoop);
}

/* ---------------------------
   UI update / result
--------------------------- */
function updateUI() {
  if (firstQR) {
    document.getElementById('text1').innerText = firstQR.text ?? "(RAW)";
    document.getElementById('mg1').innerText =
      (firstQR.managementCode !== undefined) ? firstQR.managementCode.toString(2).padStart(16,'0') : "なし";
  }
  if (secondQR) {
    document.getElementById('text2').innerText = secondQR.text ?? "(RAW)";
    document.getElementById('mg2').innerText =
      (secondQR.managementCode !== undefined) ? secondQR.managementCode.toString(2).padStart(16,'0') : "なし";
  } else if (savedSecondQrRawData && !secondQR) {
    // まだ復号前だが、第2RAWは取れている
    document.getElementById('text2').innerText = "（第2RAW取得済み：復号待ち）";
    document.getElementById('mg2').innerText = "（復号後に表示）";
  }
}

function formatResultText(text) {
  if (/^https?:\/\//i.test(text)) return `<a href="${text}" target="_blank" style="color:#03DAC6; text-decoration:underline;">${text}</a>`;
  const div = document.createElement('div'); div.innerText = text; return div.innerHTML;
}

function showResultScreen() {
  if (navigator.vibrate) navigator.vibrate([40, 30, 40]);

  document.getElementById('cameraContainer').style.display = 'none';
  document.getElementById('statusPanel').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';

  document.getElementById('finalText1').innerHTML = formatResultText(firstQR.text);
  document.getElementById('finalMg1').innerText =
    (firstQR.managementCode !== undefined) ? firstQR.managementCode.toString(2).padStart(16,'0') : "なし";

  document.getElementById('finalText2').innerHTML = formatResultText(secondQR.text);
  document.getElementById('finalMg2').innerText =
    (secondQR.managementCode !== undefined) ? secondQR.managementCode.toString(2).padStart(16,'0') : "なし";
}

function goBack() {
  firstQR = null;
  secondQR = null;
  appPassword = null;
  savedSecondQrRawData = null;
  savedSecondQrPoints = null;
  needEncryptedSecond = false;

  failStreak = 0;
  heavyMode = false;

  document.getElementById('text1').innerText = "未検出";
  document.getElementById('text2').innerText = "未検出";
  document.getElementById('mg1').innerText = "--";
  document.getElementById('mg2').innerText = "--";
  setHint("");

  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('cameraContainer').style.display = 'block';
  document.getElementById('statusPanel').style.display = 'block';

  octx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

  isScanning = true;
  requestAnimationFrame(scanLoop);
}

function drawBoundingBox(points, color) {
  if (!points || points.length < 3) return;
  octx.beginPath();
  octx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) octx.lineTo(points[i].x, points[i].y);
  octx.closePath();
  octx.lineWidth = 6;
  octx.strokeStyle = color;
  octx.stroke();
  octx.fillStyle = color + '44';
  octx.fill();
}
</script>
